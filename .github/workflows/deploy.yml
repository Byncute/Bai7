name: Build and Push to Docker Hub

on:
  push:
    branches: [ "main" ] # Mỗi khi push code lên nhánh main sẽ chạy

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/hello-docker:latest

    - name: Triển khai lên DevOps Classroom
      run: |
        REPO="tuankietho/hello-docker"
        CONTAINER_PORT=80
        
        # Gửi request Webhook và nhận phản hồi
        RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=2&container_port=$CONTAINER_PORT&strict_container_port=0")
        
        # Tách lấy nội dung JSON và Mã trạng thái HTTP
        BODY=$(echo "$RESPONSE" | sed '$d')
        CODE=$(echo "$RESPONSE" | tail -n1)
        
        echo "Webhook HTTP Status: $CODE"
        
        if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
          echo "Deploy thất bại. Kiểm tra log chi tiết bên dưới."
          echo "::group::Chi tiết lỗi từ Webhook"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
          exit 1
        else
          echo "Deploy thành công rực rỡ!"
          echo "::group::Thông tin chi tiết hệ thống"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
          echo "App URL: https://c5-n15-s2.ithutech.io.vn/"
        fi
