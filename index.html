<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Tuấn Kiệt</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary-color: #38bdf8; /* Màu xanh Cyan */
            --accent-color: #10b981;  /* Màu xanh lá của trạng thái Running */
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 450px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        .avatar-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            color: var(--bg-color);
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: -0.025em;
        }

        .tagline {
            color: var(--primary-color);
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: block;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .info-grid {
            text-align: left;
            background: rgba(15, 23, 42, 0.5);
            padding: 1.2rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }

        .info-item {
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .info-label {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .info-value {
            font-weight: 600;
            color: var(--text-main);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-color);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: bold;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-color);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar-circle">TK</div>
        <h1>Tuấn Kiệt</h1>
        <span class="tagline">Hello Docker! This is my first app</span>

        <div class="info-grid">
            <div class="info-item">
                <span class="info-label">Tuổi:</span>
                <span class="info-value">22</span>
            </div>
            <div class="info-item">
                <span class="info-label">Vị trí:</span>
                <span class="info-value">Intern tại DCSS</span>
            </div>
            <div class="info-item">
                <span class="info-label">Trường:</span>
                <span class="info-value">HUTECH University</span>
            </div>
        </div>

        <div class="status-badge">
            <div class="dot"></div>
            DEPLOYED ON SLOT S2
        </div>

        <footer>
            &copy; 2026 Crafted with ❤️ by Tuấn Kiệt
        </footer>
    </div>

</body>
</html>
